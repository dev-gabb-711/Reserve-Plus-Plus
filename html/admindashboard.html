<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESERVE++ | Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="page page--admindashboard">
  <div class="app-bg"></div>

  <div class="page-wrap">
    <aside class="side-nav">
      <div class="side-icons">
        <button class="side-btn active" type="button" onclick="location.href='admindashboard.html'"><span
            class="material-symbols-rounded">home</span></button>
        <button class="side-btn" type="button" onclick="location.href='rseat.html'"><span
            class="material-symbols-rounded">computer</span></button>
        <button class="side-btn" type="button" onclick="location.href='itassistadmin.html'"><span
            class="material-symbols-rounded">report</span></button>
        <button class="side-btn" type="button" onclick="location.href='notifications.html'"><span
            class="material-symbols-rounded">notifications</span></button>
      </div>
      <div class="side-brand">
        <img src="../img/logo.png" class="brand-logo" alt="Logo">
      </div>
    </aside>

    <main class="main-area">
      <div class="dash-grid">
        <header class="dash-head">
          <div class="head-left">
            <div>
              <h1 class="page-title">Hi, Gabby</h1>
              <p class="page-subtitle">System overview and assistance reports</p>
            </div>
            <div class="search-wrap">
              <div class="search-pill">
                <span class="search-ico">
                  <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="11" cy="11" r="7"></circle>
                    <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                  </svg>
                </span>
                <input type="text" id="labSearch" placeholder="Search for Labs here...">
              </div>
            </div>
          </div>
        </header>

        <section class="center-col">
          <div class="hero-shell">
            <div class="hero-track" id="heroTrack"></div>
          </div>

          <div class="bottom-grid">
            <div class="panel post-panel">
              <div class="panel-title">Post an Announcement</div>
              <textarea class="post-box" id="announceText"
                placeholder="Write something for students and staff..."></textarea>
              <div class="post-actions">
                <button class="pill-btn" id="postBtn">Post</button>
                <button class="pill-btn pill-ghost" id="clearBtn">Cancel</button>
              </div>
            </div>

            <div class="ticket-shell">
              <div class="ticket-track" id="ticketTrack"></div>
            </div>
          </div>
        </section>

        <aside class="right-col">
          <div class="profile-card">
            <div class="profile-row">
              <div class="seal-wrap">
                <img src="../img/dlsu.png" class="seal" alt="Seal">
              </div>
              <div class="profile-meta">
                <div class="profile-name">Gabby Martinez</div>
                <div class="profile-role">Admin</div>
                <div class="profile-actions">
                  <button class="edit-btn" type="button" onclick="location.href='./profile.html'">Edit Profile</button>
                  <button class="profile-icon-btn logout" type="button" data-bs-toggle="modal"
                    data-bs-target="#logoutModal" aria-label="Log Out">
                    <span class="material-symbols-rounded">logout</span>
                  </button>
                </div>
              </div>
            </div>

            <div class="notif-title">Notifications</div>
            <div class="notif-mini" id="notifMini"></div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content"
        style="background: #161618; border: 1px solid var(--stroke); border-radius: 20px; color: white;">
        <div class="modal-body" style="padding: 30px; text-align: center;">
          <h5 style="margin-bottom: 15px;">Confirm Logout</h5>
          <p style="opacity: 0.7;">Are you sure you want to log out?</p>
          <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
            <button type="button" class="btn" style="color: white; border: 1px solid var(--stroke);"
              data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn" style="background: #ff3b3b; color: white;"
              onclick="location.href='login.html'">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function makeAvatar(color) {
      return `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' rx='50' fill='${color}'/><circle cx='50' cy='40' r='15' fill='white'/><rect x='30' y='55' width='40' height='25' rx='12' fill='white'/></svg>`;
    }

    const heroTrack = document.getElementById("heroTrack");
    const ticketTrack = document.getElementById("ticketTrack");
    const notifMini = document.getElementById("notifMini");

    const buildings = [
      {
        title: "Br. Andrew Gonzalez Hall",
        image: "../img/lab.jpg",
        rooms: [
          { name: "Room A1103 • 33", status: "assist", count: 2 },
          { name: "Room A1103 • 1", status: "assist", count: 5 },
          { name: "Room A1103 • 12", status: "ok", count: 0 },
          { name: "Room A1103 • 4", status: "assist", count: 4 },
          { name: "Room A1103 • 18", status: "assist", count: 1 },
          { name: "Room A1103 • 21", status: "ok", count: 0 },
          { name: "Room A1103 • 7", status: "assist", count: 3 },
          { name: "Room A1103 • 10", status: "assist", count: 6 },
          { name: "Room A1103 • 14", status: "ok", count: 0 },
          { name: "Room A1103 • 2", status: "assist", count: 2 },
          { name: "Room A1103 • 9", status: "ok", count: 0 },
          { name: "Room A1103 • 5", status: "assist", count: 4 }
        ]
      },
      {
        title: "Gokongwei Hall",
        image: "../img/lab.jpg",
        rooms: [
          { name: "Room GK201 • 6", status: "ok", count: 0 },
          { name: "Room GK201 • 11", status: "assist", count: 1 },
          { name: "Room GK201 • 3", status: "assist", count: 2 },
          { name: "Room GK202 • 17", status: "ok", count: 0 },
          { name: "Room GK202 • 22", status: "assist", count: 5 },
          { name: "Room GK202 • 9", status: "assist", count: 3 },
          { name: "Room GK203 • 14", status: "ok", count: 0 },
          { name: "Room GK203 • 1", status: "assist", count: 4 },
          { name: "Room GK203 • 8", status: "assist", count: 2 },
          { name: "Room GK204 • 19", status: "ok", count: 0 },
          { name: "Room GK204 • 25", status: "assist", count: 6 },
          { name: "Room GK204 • 4", status: "assist", count: 1 }
        ]
      }
    ];

    const tickets = [
      { id: 1, room: "A1103", seat: "Seat 1", issue: "PC Unresponsive", status: "Unresolved", priority: 1 },
      { id: 2, room: "GK202", seat: "Seat 17", issue: "Keyboard missing", status: "Unresolved", priority: 2 },
      { id: 3, room: "GK204", seat: "Seat 4", issue: "Monitor flickering", status: "Ongoing", priority: 3 }];

    const notifications = [
      {
        id: 1,
        name: "IT Assist",
        snippet: "PC Concern has been resolved",
        avatar: makeAvatar("purple")
      },
      {
        id: 2,
        name: "IT Assist",
        snippet: "Keyboard replaced in Room A1103 • Seat 4",
        avatar: makeAvatar("purple")
      },
      {
        id: 3,
        name: "System",
        snippet: "Scheduled maintenance tonight from 10:00 PM to 12:00 AM",
        avatar: makeAvatar("indigo")
      },
      {
        id: 4,
        name: "Lab Admin",
        snippet: "New assistance ticket filed for Room GK202 • Seat 17",
        avatar: makeAvatar("teal")
      }
    ];


    function renderHero() {
      heroTrack.innerHTML = buildings.map(building => `
        <article class="hero-card">
          <div class="hero-bg" style="background-image:linear-gradient(110deg, rgba(110,55,185,0.2), rgba(0,0,0,0.2)),url('${building.image}')"></div>
          <div class="hero-inner">
            <div class="hero-top">
              <div class="hero-title">${building.title}</div>
              <div class="hero-arrows">
                <button class="hero-arrow hero-prev" type="button" aria-label="Previous"><span class="material-symbols-rounded">chevron_left</span></button>
                <button class="hero-arrow hero-next" type="button" aria-label="Next"><span class="material-symbols-rounded">chevron_right</span></button>
              </div>
            </div>

            <div class="room-scroll">
              <div class="room-grid">
                ${building.rooms.map(room => `
                  <div class="room-row">
                    <span class="pill-dot ${room.status === "ok" ? "ok" : "bad"}"></span>
                    <div class="room-meta">
                      <div class="room-name">${room.name}</div>
                      <div class="room-sub">${room.status === "ok" ? "All Good" : `${room.count} Assistance Requests`}</div>
                    </div>
                  </div>
                `).join("")}
              </div>
            </div>
          </div>
        </article>
      `).join("");
    }

    function renderTickets() {
      ticketTrack.innerHTML = tickets.map(ticket => `
    <article class="ticket-card">
      <div class="ticket-bg"></div>

      <div class="ticket-content">
        <div class="ticket-head">
          <div class="ticket-title">Assistance Ticket ${ticket.id}</div>
          <div class="ticket-sub">${ticket.room} • ${ticket.seat}</div>
        </div>

        <div class="ticket-divider"></div>

        <div class="ticket-body">
          <div class="kv-row"><span>Issue : ${ticket.issue}</span></div>
          <div class="kv-row"><span>Status : ${ticket.status}</span></div>
          <div class="kv-row"><span>Priority Level : ${ticket.priority}</span></div>
        </div>

        <div class="ticket-foot">
          <button class="ticket-btn">Resolved</button>
        </div>
      </div>
    </article>
  `).join("");
    }


    function renderNotifications() {
      notifMini.innerHTML = notifications.map(n => `
        <div class="mini-item">
          <img src="${n.avatar}" class="mini-ava" alt="">
          <div class="mini-text">
            <div class="mini-name">${n.name}</div>
            <div class="mini-snippet">${n.snippet}</div>
          </div>
        </div>
      `).join("");
    }

    function getHeroIndex() {
      const w = heroTrack.clientWidth || 1;
      return Math.round(heroTrack.scrollLeft / w);
    }

    function updateHeroArrows() {
      const idx = getHeroIndex();
      const isFirst = idx <= 0;
      const isLast = idx >= buildings.length - 1;
      document.querySelectorAll(".hero-prev").forEach(btn => btn.style.display = isFirst ? "none" : "grid");
      document.querySelectorAll(".hero-next").forEach(btn => btn.style.display = isLast ? "none" : "grid");
    }

    function setupHeroScroll() {
      heroTrack.addEventListener("click", (e) => {
        const prev = e.target.closest(".hero-prev");
        const next = e.target.closest(".hero-next");
        if (!prev && !next) return;
        const step = heroTrack.clientWidth;
        heroTrack.scrollBy({ left: prev ? -step : step, behavior: "smooth" });
      });


      heroTrack.addEventListener("scroll", () => requestAnimationFrame(updateHeroArrows));
      window.addEventListener("resize", updateHeroArrows);
      updateHeroArrows();
    }

    function enableWheelHorizontalScroll(el) {
      el.addEventListener("wheel", (e) => {
        const canScrollX = el.scrollWidth > el.clientWidth + 1;
        const atTopBoxRoomScroll = e.target.closest(".room-scroll");
        if (!canScrollX || atTopBoxRoomScroll) return;

        const intentVertical = Math.abs(e.deltaY) > Math.abs(e.deltaX);
        if (!intentVertical) return;

        e.preventDefault();
        el.scrollBy({ left: e.deltaY, behavior: "auto" });
      }, { passive: false });
    }


    renderHero();
    renderTickets();
    renderNotifications();
    setupHeroScroll();
    enableWheelHorizontalScroll(heroTrack);
    enableWheelHorizontalScroll(ticketTrack);
  </script>
</body>

</html>
