<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RESERVE++: Sign Up</title>
	<link rel="stylesheet" href="../css/auth.css">
</head>

<body>
	<div class="auth-container">
		<div class="form-side">
			<h1>Sign Up</h1>
			<form>
				<input type="text" placeholder="Username/Email" class="input-field">

				<div class="name-row">
					<input type="text" placeholder="First Name" class="input-field">
					<input type="text" placeholder="Last Name" class="input-field">
				</div>

				<input type="password" placeholder="Password" class="input-field">

				<button type="submit" class="submit-btn">Sign Up</button>
			</form>
			<a href="login.html" class="helper-link switch-page">Already have an account?</a>
		</div>

		<div class="visual-side">
			<div class="logo-tag">RS++</div>
			<!-- Actual image/logo/graphic here -->
		</div>
	</div>
</body>

</html>
