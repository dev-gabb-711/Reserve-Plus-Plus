<!DOCTYPE html>
<html lang="en">
<head>
  <!--========================= META + LINKS =========================-->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESERVE++ | IT Assist Admin</title>

  <!--========================= VENDORS + FONTS =========================-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">

  <!--========================= PAGE STYLES =========================-->
  <link rel="stylesheet" href="../css/itassistadmin.css">
</head>

<body class="page page--itassistadmin">
  <!--========================= BACKGROUND LAYER =========================-->
  <div class="app-bg"></div>

  <!--========================= PAGE WRAPPER =========================-->
  <div class="page-wrap">

    <!--========================= SIDEBAR NAV =========================-->
    <aside class="side-nav">
      <div class="side-icons">
        <button class="side-btn" type="button" onclick="goToDashboard()">
          <span class="material-symbols-rounded">home</span>
        </button>

        <button class="side-btn" type="button" onclick="location.href='rseat.html'">
          <span class="material-symbols-rounded">computer</span>
        </button>

        <button class="side-btn active" type="button" onclick="location.href='itassistadmin.html'">
          <span class="material-symbols-rounded">report</span>
        </button>

        <button class="side-btn" type="button" onclick="location.href='notifications.html'">
          <span class="material-symbols-rounded">notifications</span>
        </button>
      </div>

      <div class="side-brand">
        <img src="../img/logo.png" class="brand-logo" alt="Logo">
      </div>
    </aside>

    <!--========================= MAIN CONTENT =========================-->
    <main class="main-area">

      <!--========================= HEADER (TITLE + FILTER) =========================-->
      <div class="top-row">
        <div>
          <h1 class="page-title">IT Assist</h1>
          <p class="page-subtitle">View all tickets and reports</p>
        </div>

        <!------------------Filter Button------------------>
        <button class="filter-btn" type="button" aria-label="Filters">
          <span class="material-symbols-rounded">tune</span>
        </button>
      </div>

      <!--========================= TICKETS SHELL =========================-->
      <div class="tickets-shell">
        <div class="tickets-scroll">

          <!--========================= TICKET GRID =========================-->
          <div class="ticket-grid" id="ticketGrid"></div>

        </div>
      </div>

    </main>
  </div>

  <!--========================= SCRIPTS =========================-->
  <script src="../js/itassistadmin.js"></script>
</body>
</html>
