<!DOCTYPE html>
<html lang="en">
<head>
  <!--========================= META + TITLE =========================-->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications</title>

  <!--========================= VENDORS + FONTS =========================-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!--========================= PAGE STYLES =========================-->
  <link rel="stylesheet" href="../css/notifications.css">
</head>

<body class="page page--notifications">
  <!--========================= BACKGROUND LAYER =========================-->
  <div class="app-bg"></div>

  <!--========================= PAGE WRAPPER =========================-->
  <div class="page-wrap">

    <!--========================= SIDEBAR NAV =========================-->
    <aside class="side-nav">
      <div class="side-icons">
        <button class="side-btn" type="button" onclick="goToDashboard()">
          <span class="material-symbols-rounded">home</span>
        </button>

        <button class="side-btn" type="button" onclick="location.href='rseat.html'">
          <span class="material-symbols-rounded">computer</span>
        </button>

        <button class="side-btn" type="button" onclick="location.href='itassist.html'">
          <span class="material-symbols-rounded">report</span>
        </button>

        <button class="side-btn active" type="button" onclick="location.href='notifications.html'">
          <span class="material-symbols-rounded">notifications</span>
        </button>
      </div>

      <div class="side-brand">
        <img src="../img/logo.png" class="brand-logo" alt="Logo">
      </div>
    </aside>

    <!--========================= MAIN CONTENT =========================-->
    <main class="main-area">

      <!--========================= HEADER (TITLE + SEARCH) =========================-->
      <div class="top-row">
        <div>
          <h1 class="page-title">Notifications</h1>
          <p class="page-subtitle">Important updates and system messages appear here</p>
        </div>

        <div class="search-wrap">
          <div class="search-pill">
            <span class="search-ico">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
              </svg>
            </span>

            <input type="text" id="searchInput" placeholder="Search notification...">
          </div>
        </div>
      </div>

      <!--========================= MAIN BOX =========================-->
      <div class="notif-shell">
        <div class="content-grid">

          <!--========================= LEFT PANEL (LIST) =========================-->
          <div class="panel list-panel">
            <div id="notifList" class="notif-list"></div>
          </div>

          <!--========================= RIGHT PANEL (DETAILS) =========================-->
          <div class="panel detail-panel">

            <!------------------ Header ------------------>
            <div id="detailHead" class="detail-head">
              <img id="detailAvatar" class="detail-avatar" alt="Sender Avatar">

              <div>
                <div id="detailTitle" class="detail-title">Notifications</div>
                <div id="detailRole" class="detail-role">Select a message</div>
              </div>
            </div>

            <!------------------ Divider ------------------>
            <div id="detailDivider" class="detail-divider"></div>

            <!------------------ Body ------------------>
            <div id="detailBody" class="detail-body">
              Select a notification to view details
            </div>

            <!------------------ Actions ------------------>
            <div id="detailActions" class="detail-actions">
              <button id="removeBtn" class="btn-soft" type="button">Remove</button>
              <button id="cancelBtn" class="btn-soft" type="button">Cancel</button>
            </div>

          </div>
        </div>
      </div>

    </main>
  </div>

  <!--========================= SCRIPTS =========================-->
  <script src="../js/notifications.js"></script>
</body>
</html>
