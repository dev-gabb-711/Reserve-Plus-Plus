<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESERVE++: IT Assist Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="../css/itassistadmin.css">
</head>

<body>
<div class="app-bg"></div>
<div class="page-wrap">

  <aside class="side-nav">
    <div class="side-icons">
      <button class="side-btn" type="button" onclick="location.href='admindashboard.html'"><span class="material-symbols-rounded">home</span></button>
      <button class="side-btn" type="button" onclick="location.href='rseat.html'"><span class="material-symbols-rounded">computer</span></button>
      <button class="side-btn active" type="button" onclick="location.href='itassistadmin.html'"><span class="material-symbols-rounded">report</span></button>
      <button class="side-btn" type="button" onclick="location.href='notifications.html'"><span class="material-symbols-rounded">notifications</span></button>
    </div>
    <div class="side-brand">
      <img src="../img/logo.png" class="brand-logo" alt="Logo">
    </div>
  </aside>

  <main class="main-area">
    <div class="top-row">
      <div>
        <h1 class="page-title">IT Assist</h1>
        <p class="page-subtitle">View all tickets and reports</p>
      </div>

      <button class="filter-btn" type="button" aria-label="Filters">
        <span class="material-symbols-rounded">tune</span>
      </button>
    </div>

    <div class="tickets-shell">
      <div class="tickets-scroll">
        <div class="ticket-grid" id="ticketGrid"></div>
      </div>
    </div>
  </main>

</div>

<script>
const ticketGrid = document.getElementById("ticketGrid");

const tickets = [
  { title:"Assistance Ticket 1", sub:"A1103 • Seat 1", issue:"PC Unresponsive", status:"Unresolved", priority:"1" },
  { title:"Assistance Ticket 1", sub:"A1103 • Seat 1", issue:"PC Unresponsive", status:"Unresolved", priority:"1" },
  { title:"Assistance Ticket 1", sub:"A1103 • Seat 1", issue:"PC Unresponsive", status:"Unresolved", priority:"1" },
  { title:"Assistance Ticket 1", sub:"A1103 • Seat 1", issue:"PC Unresponsive", status:"Unresolved", priority:"1" },
  { title:"Assistance Ticket 1", sub:"A1103 • Seat 1", issue:"PC Unresponsive", status:"Unresolved", priority:"1" },
  { title:"Assistance Ticket 1", sub:"A1103 • Seat 1", issue:"PC Unresponsive", status:"Unresolved", priority:"1" }
];

ticketGrid.innerHTML = tickets.map(t => `
  <div class="ticket-card">
    <div class="ticket-head">
      <div class="t-title">${t.title}</div>
      <div class="t-sub">${t.sub}</div>
    </div>

    <div class="ticket-line"></div>

    <div class="ticket-body">
      <div><span class="k">Issue :</span> ${t.issue}</div>
      <div><span class="k">Status:</span> ${t.status}</div>
      <div><span class="k">Priority Level:</span> ${t.priority}</div>
    </div>

    <div class="ticket-actions">
      <button class="pill-btn" type="button">Resolved</button>
    </div>
  </div>
`).join("");
</script>
</body>
</html>
