<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserve++ | Log In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/login.css">
</head>

<body class="page page--login">
  <div class="app-bg"></div>

  <main class="auth-wrap">
    <section class="auth-card">

      <!-- LEFT: FORM -->
      <div class="auth-left">
        <h1 class="auth-title">Log In</h1>

        <form class="auth-form" action="#" method="post">
          <label class="field">
            <span class="sr-only">Username/Email</span>
            <input type="text" placeholder="Username/Email" id="username" required>
          </label>

          <label class="field">
            <span class="sr-only">Password</span>
            <input type="password" placeholder="Password" required>
          </label>

          <a class="auth-link" href="./forgot.html">Forgot Password</a>

          <button class="btn-grad" type="submit">Log in</button>

          <a class="auth-link bottom" href="./signup.html">Not yet a member? Sign up now</a>
        </form>
      </div>

      <!-- RIGHT: IMAGE -->
      <div class="auth-right">
        <img src="../img/rightimg.png" alt="Computer Lab" class="auth-img">
      </div>
    </section>
  </main>

<!--username student goes to student dash board, admin goes to it dashboard-->
<script>
    const form = document.querySelector('.auth-form');

    form.addEventListener('submit', function(e) {
        e.preventDefault(); // for now, prevents actual input submission since the log in is based purely on username

        // Get username
        const username = document.getElementById('username').value.trim().toLowerCase();

        if (username === 'admin') {
            localStorage.setItem('role', 'admin');
            location.href = './admindashboard.html';
        } else {
            // Anything else goes to student dashboard
            localStorage.setItem('role', 'student');
            location.href = './dashboard.html';
        }
    });
</script>

</body>
</html>
