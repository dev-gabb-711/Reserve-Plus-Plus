<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESERVE++ Admin Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="../css/admindashboard.css">
</head>

<body>
  <div class="app-bg"></div>

  <div class="page-wrap">
    <aside class="side-nav">
      <div class="side-icons">
        <button class="side-btn active">
          <span class="material-symbols-rounded">home</span>
        </button>
        <button class="side-btn">
          <span class="material-symbols-rounded">computer</span>
        </button>
        <button class="side-btn">
          <span class="material-symbols-rounded">event_seat</span>
        </button>
        <button class="side-btn">
          <span class="material-symbols-rounded">notifications</span>
        </button>
      </div>

      <div class="side-brand">
        <img src="../img/logo.png" class="brand-logo" alt="Logo">
      </div>
    </aside>

    <main class="main-area">
      <div class="top-row">
        <div>
          <h1 class="page-title">Hi, Gabby</h1>
          <p class="page-subtitle">System overview and assistance reports</p>
        </div>

        <div class="search-wrap">
          <div class="search-pill">
            <span class="search-ico">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
              </svg>
            </span>
            <input type="text" id="labSearch" placeholder="Search for Labs here...">
          </div>
        </div>
      </div>

      <div class="dash-grid">
        <section class="center-col">
          <div class="hero-shell">
            <div class="hero-track" id="heroTrack"></div>
          </div>

          <div class="bottom-grid">
            <div class="panel post-panel">
              <div class="panel-title">Post an Announcement</div>

              <textarea
                class="post-box"
                id="announceText"
                placeholder="Write something for students and staff..."
              ></textarea>

              <div class="post-actions">
                <button class="pill-btn" id="postBtn">Post</button>
                <button class="pill-btn pill-ghost" id="clearBtn">Cancel</button>
              </div>
            </div>

            <div class="ticket-shell">
              <div class="ticket-track" id="ticketTrack"></div>
            </div>
          </div>
        </section>

        <aside class="right-col">
          <div class="profile-card">
            <div class="profile-row">
              <div class="seal-wrap">
                <img src="../img/dlsu.png" class="seal" alt="Seal">
              </div>

              <div class="profile-meta">
                <div class="profile-name">Gabby Martinez</div>
                <div class="profile-role">Admin</div>
                <button class="edit-btn">Edit Profile</button>
              </div>
            </div>

            <div class="notif-title">Notifications</div>
            <div class="notif-mini" id="notifMini"></div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script>
    function makeAvatar(color) {
  return `
    data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'>
      <rect width='100' height='100' rx='50' fill='${color}'/>
      <circle cx='50' cy='40' r='15' fill='white'/>
      <rect x='30' y='55' width='40' height='25' rx='12' fill='white'/>
    </svg>
  `;
}

const heroTrack = document.getElementById("heroTrack");
const ticketTrack = document.getElementById("ticketTrack");
const notifMini = document.getElementById("notifMini");

const buildings = [
  {
    title: "Br. Andrew Gonzalez Hall",
    image: "../img/lab.jpg",
    rooms: [
      { name: "Room A1103 • 33", status: "assist", count: 2 },
      { name: "Room A1103 • 1", status: "assist", count: 5 },
      { name: "Room A1103 • 12", status: "ok", count: 0 },
      { name: "Room A1103 • 4", status: "assist", count: 4 }
    ]
  }
];

const tickets = [
  {
    id: 1,
    room: "A1103",
    seat: "Seat 1",
    issue: "PC Unresponsive",
    status: "Unresolved",
    priority: 1
  }
];

const notifications = [
  {
    id: 1,
    name: "IT Assist",
    snippet: "PC Concern has been resolved",
    avatar: makeAvatar("purple")
  }
];

function renderHero() {
  heroTrack.innerHTML = buildings.map(building => `
    <article class="hero-card">
      <div
        class="hero-bg"
        style="background-image:
          linear-gradient(110deg, rgba(110,55,185,0.7), rgba(0,0,0,0.2)),
          url('${building.image}')">
      </div>

      <div class="hero-inner">
        <div class="hero-title">${building.title}</div>

        <div class="room-grid">
          ${building.rooms.map(room => `
            <div class="room-row">
              <span class="pill-dot ${room.status === "ok" ? "ok" : "bad"}"></span>
              <div class="room-meta">
                <div class="room-name">${room.name}</div>
                <div class="room-sub">
                  ${room.status === "ok" ? "All Good" : `${room.count} Assistance Requests`}
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    </article>
  `).join("");
}

function renderTickets() {
  ticketTrack.innerHTML = tickets.map(ticket => `
    <article class="ticket-card">
      <div class="ticket-title">Assistance Ticket ${ticket.id}</div>
      <div class="ticket-sub">${ticket.room} • ${ticket.seat}</div>

      <div class="ticket-divider"></div>

      <div class="kv">
        <span>Issue</span>
        <b>${ticket.issue}</b>
      </div>

      <div class="kv">
        <span>Status</span>
        <b>${ticket.status}</b>
      </div>

      <div class="kv">
        <span>Priority Level</span>
        <b>${ticket.priority}</b>
      </div>
    </article>
  `).join("");
}

function renderNotifications() {
  notifMini.innerHTML = notifications.map(n => `
    <div class="mini-item">
      <img src="${n.avatar}" class="mini-ava">
      <div class="mini-text">
        <div class="mini-name">${n.name}</div>
        <div class="mini-snippet">${n.snippet}</div>
      </div>
    </div>
  `).join("");
}

renderHero();
renderTickets();
renderNotifications();

  </script>
</body>
</html>
