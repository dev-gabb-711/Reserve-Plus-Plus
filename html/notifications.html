<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications</title>

  <!-- Bootstrap and Design Links -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!-- All design here -->
  <link rel="stylesheet" href="../css/notifications.css">
</head>

<body>
<div class="app-bg"></div>
<div class="page-wrap">

  <!-- Sidebar -->
  <aside class="side-nav">
  <div class="side-icons">

    <button class="side-btn" type="button" onclick="goToDashboard()"><span class="material-symbols-rounded">home</span></button>
  <button class="side-btn" type="button" onclick="location.href='rseat.html'"><span class="material-symbols-rounded">computer</span></button>
  <button class="side-btn" type="button" onclick="location.href='itassist.html'"><span class="material-symbols-rounded">report</span></button>
  <button class="side-btn active" type="button" onclick="location.href='notifications.html'"><span class="material-symbols-rounded">notifications</span></button>
  </div>

  <div class="side-brand">
    <img src="../img/logo.png" class="brand-logo" alt="Logo">
  </div>
</aside>


<!-- Main -->
<main class="main-area">
  <div class="top-row">

    <div>
      <h1 class="page-title">Notifications</h1>
      <p class="page-subtitle">
        Important updates and system messages appear here
      </p>
    </div>

    <div class="search-wrap">
      <div class="search-pill">
        <span class="search-ico">
            <svg viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
            </svg>
        </span>

        <input type="text" id="searchInput" placeholder="Search notification...">
      </div>
    </div>
  </div>

  <!-- MAIN BOX -->
  <div class="notif-shell">
    <div class="content-grid">

      <!-- LEFT PANEL -->
      <div class="panel list-panel">
        <div id="notifList" class="notif-list"></div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="panel detail-panel">

        <div class="detail-head">

          <img
            id="detailAvatar"
            class="detail-avatar"
          >

          <div>
            <div id="detailTitle" class="detail-title">
              Notifications
            </div>

            <div id="detailRole" class="detail-role">
              Select a message
            </div>
          </div>

        </div>

        <div class="detail-divider"></div>

        <div id="detailBody" class="detail-body">
          Select a notification to view details
        </div>

        <div class="detail-actions">
          <button id="removeBtn" class="btn-soft">
            Remove
          </button>
          <button id="cancelBtn" class="btn-soft">
            Cancel
          </button>
        </div>
      </div>
    </div>
  </div>
</main>
</div>


<!-- JAVASCRIPT (Para lang may makita ako kunwari)  -->
<script>

// Avatar generator (Replace with real pictures)
function makeAvatar(color)
{
  return `
  data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'>
    <rect width='100' height='100' rx='50' fill='${color}'/>
    <circle cx='50' cy='40' r='15' fill='white'/>
    <rect x='30' y='55' width='40' height='25' rx='12' fill='white'/>
  </svg>
  `;
}


// Notifications data
let notifications =
[
  {
    id:1,
    name:"IT Assist",
    role:"Lab Technician",
    snippet:"PC Concern has been resolved",
    body:"Your PC concern has been successfully resolved.",
    avatar:makeAvatar("purple")
  },

  {
    id:2,
    name:"Reserve++ Team",
    role:"System",
    snippet:"Please answer this survey",
    body:"Please answer the feedback survey.",
    avatar:makeAvatar("blue")
  },

  {
    id:3,
    name:"Room A1103 • Seat 1",
    role:"Reservation",
    snippet:"Reservation cancelled successfully",
    body:"Your reservation has been cancelled.",
    avatar:makeAvatar("teal")
  }

];


let selectedID = null;

const notifList = document.getElementById("notifList");
const detailAvatar = document.getElementById("detailAvatar");
const detailTitle = document.getElementById("detailTitle");
const detailRole = document.getElementById("detailRole");
const detailBody = document.getElementById("detailBody");

const searchInput = document.getElementById("searchInput");

// Render notifications
function renderNotifications(list)
{
  notifList.innerHTML = "";

  list.forEach(function(n)
  {
    let item = document.createElement("div");

    item.className = "notif-item" + (n.id === selectedID ? " active" : "");

    item.innerHTML =
    `
      <img src="${n.avatar}" class="avatar">

      <div>
        <div class="notif-name">${n.name}</div>
        <div class="notif-snippet">${n.snippet}</div>
      </div>
    `;

    item.onclick = function()
    {
      selectNotification(n.id);
      renderNotifications(list);
    };

    notifList.appendChild(item);
  });
}



// Select notification
function selectNotification(id)
{
  let n = notifications.find(x => x.id === id);
  if (!n) return;

  selectedID = id;

  detailAvatar.src = n.avatar;
  detailTitle.innerText = n.name;
  detailRole.innerText = n.role;
  detailBody.innerText = n.body;
}

// Remove notification
document
.getElementById("removeBtn")
.onclick =
function()
{

  if(selectedID == null)
  return;

  notifications =
  notifications.filter(
    x => x.id !== selectedID
  );

  renderNotifications(notifications);

};

// Cancel selection
document
.getElementById("cancelBtn")
.onclick =
function()
{

  selectedID = null;

  detailTitle.innerText =
  "Notifications";

  detailRole.innerText =
  "";

  detailBody.innerText =
  "Select a notification";

};

// Search
searchInput.oninput =
function()
{

  let text =
  this.value.toLowerCase();

  let filtered =
  notifications.filter(
    n =>
      n.name.toLowerCase().includes(text)
  );

  renderNotifications(filtered);

};


// Initial render
renderNotifications(notifications);

// function for keeping track of which dashboard to visit
function goToDashboard() {
        const role = localStorage.getItem('role');

        if (role === 'admin') {
            location.href = './admindashboard.html';
        } else {
            location.href = './dashboard.html';
        }
}

</script>
</body>
</html>
