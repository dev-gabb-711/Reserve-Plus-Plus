<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RESERVE++: Profile</title>
</head>

<body>
    <div class="profile-container">
        <!--NAVBAR-->
        <nav class="sidebar">            
			<ul class="nav-links">
				<li><i class="icon-home"></i></li>
				<li><i class="icon-monitor"></i></li>
				<li><i class="icon-report"></i></li>
				<li><i class="icon-bell"></i></li>
			</ul>
            <div class="logo">RS++</div>
        </nav>

        <header class="profile-header">
            <h1>My Profile</h1>
            <p>Welcome to your account center</p>
            <input type="search" placeholder="Search for Labs here...">            
        </header>

        <main class="profile-main">
            <section class="profile-settings">
                <img src="../img/def_avatar.jpg" alt="Profile"><br>
                <button type="button">Delete Account</button><br>
                <button type="button">Edit Profile</button>
            </section>

            <section class="account-info">
                <h1>FirstName LastName</h1>
                <h2>Lab User</h2>

                <h4>User Email</h4>
                <p>sample.email@dlsu.edu.ph</p>

                <h4>Password</h4>
                <p>*************</p>
            </section>
        </main>


    </div>

</body>
</html>
