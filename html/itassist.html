<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESERVE++ | IT Assist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="../css/itassist.css">
</head>
<body>
  <div class="app-bg"></div>

  <div class="layout">
    <aside class="side-nav">
      <div class="side-icons">
        <button class="side-btn" type="button" onclick="location.href='dashboard.html'"><span class="material-symbols-rounded">home</span></button>
        <button class="side-btn" type="button" onclick="location.href='rseat.html'"><span class="material-symbols-rounded">computer</span></button>
        <button class="side-btn active" type="button" onclick="location.href='itassist.html'"><span class="material-symbols-rounded">report</span></button>
        <button class="side-btn" type="button" onclick="location.href='notifications.html'"><span class="material-symbols-rounded">notifications</span></button>
      </div>
      <div class="side-brand">
        <img src="../img/logo.png" class="brand-logo" alt="Logo">
      </div>
    </aside>

    <main class="main">
      <header class="top-row">
        <div class="top-left">
          <h1 class="page-title">IT Assist</h1>
          <p class="page-subtitle">Tell us what's wrong and we'll assist you shortly</p>
        </div>
        <div class="search-pill">
          <span class="material-symbols-rounded">search</span>
          <input type="search" placeholder="Search for Labs here...">
        </div>
      </header>

      <section class="content-grid">
        <div class="left-col">
          <section class="glass card">
            <h3 class="card-title">Report an Issue</h3>

            <form class="ticket-form" id="ticketForm">
              <div class="form-grid">
                <div class="field">
                  <label class="field-label" for="building">Building Location:</label>
                  <select id="building" class="form-control custom-input">
                    <option value="" selected disabled>Select building...</option>
                    <option value="Br. Andrew Hall">Br. Andrew Hall</option>
                    <option value="Gokongwei Hall">Gokongwei Hall</option>
                  </select>
                </div>

                <div class="field">
                  <label class="field-label" for="room">Room Number:</label>
                  <input id="room" type="text" class="form-control custom-input" placeholder="e.g. G203">
                </div>

                <div class="field">
                  <label class="field-label" for="seat">Seat Number:</label>
                  <input id="seat" type="number" class="form-control custom-input" placeholder="0" min="0">
                </div>
              </div>

              <div class="section-title">Common Laboratory Concerns</div>
              <div class="concern-chips" id="concernChips">
                <button type="button" class="chip" data-concern="PC Unresponsive / Frozen">PC Unresponsive / Frozen</button>
                <button type="button" class="chip" data-concern="No Internet Connection">No Internet Connection</button>
                <button type="button" class="chip" data-concern="Keyboard / Mouse Not Working">Keyboard / Mouse Not Working</button>
                <button type="button" class="chip" data-concern="Monitor No Display">Monitor No Display</button>
                <button type="button" class="chip" data-concern="Cannot Log In (Account Issue)">Cannot Log In (Account Issue)</button>
                <button type="button" class="chip" data-concern="Software/App Crashing">Software/App Crashing</button>
                <button type="button" class="chip" data-concern="Audio / Headphone Jack Issue">Audio / Headphone Jack Issue</button>
              </div>

              <div class="section-title">Describe Your Concern:</div>
              <div class="ticket-textarea">
                <textarea id="message" class="form-control custom-textarea" placeholder="If your issue isn't in the options above, please type it below..."></textarea>
              </div>

              <div class="btn-row d-flex justify-content-end gap-3">
                <button type="submit" class="btn btn-primary btn-proceed">Submit Ticket</button>
                <button type="button" class="btn btn-secondary btn-ghost" id="cancelBtn">Cancel</button>
              </div>
            </form>
          </section>
        </div>

        <aside class="right-col">
          <div class="glass card">
            <div class="profile-card">
              <img src="../img/def_avatar.jpg" alt="Profile">
              <div class="profile-info">
                <p class="name">Gabby Martinez</p>
                <p class="role">Lab User</p>
              </div>
            </div>
          </div>

          <div class="glass card">
            <h3 class="card-title">My Tickets</h3>

            <!-- Scroll pane -->
            <div class="tickets-pane" id="ticketsPane" aria-label="My Tickets"></div>
          </div>

          <div class="glass card">
            <button type="button" class="btn btn-outline-light btn-outline w-100">FAQ</button>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const form = document.getElementById("ticketForm");
      const chipsWrap = document.getElementById("concernChips");
      const buildingEl = document.getElementById("building");
      const roomEl = document.getElementById("room");
      const seatEl = document.getElementById("seat");
      const messageEl = document.getElementById("message");
      const cancelBtn = document.getElementById("cancelBtn");
      const ticketsPane = document.getElementById("ticketsPane");

      let selectedConcern = "";

      // Demo data (replace later with API response)
      let tickets = [
        { room: "G203", seat: 1, status: "Pending" },
        { room: "A1103", seat: 1, status: "Resolved" },
        { room: "A1103", seat: 1, status: "Resolved" },
        { room: "A1103", seat: 1, status: "Resolved" },
        { room: "A1103", seat: 1, status: "Resolved" },
        { room: "A1103", seat: 1, status: "Resolved" },
        { room: "A1103", seat: 1, status: "Resolved" },
      ];

      function statusToClass(status) {
        const s = (status || "").toLowerCase();
        if (s.includes("pending") || s.includes("open") || s.includes("waiting")) return "red";
        if (s.includes("resolved") || s.includes("closed") || s.includes("done")) return "green";
        return "purple";
      }

      function ticketCardHTML(t) {
        const cls = statusToClass(t.status);
        return `
          <div class="mini-card ${cls}">
            <div class="accent"></div>
            <div class="info">
              <strong>Room ${t.room} • Seat ${t.seat}</strong>
              <p>${t.status}</p>
            </div>
          </div>
        `.trim();
      }

      function renderTickets() {
        if (!tickets || tickets.length === 0) {
          ticketsPane.innerHTML = `<p class="mb-0" style="opacity:.75;">No tickets yet.</p>`;
          return;
        }
        ticketsPane.innerHTML = tickets.map(ticketCardHTML).join("");
      }

      function clearChipSelection() {
        selectedConcern = "";
        chipsWrap.querySelectorAll(".chip.active").forEach(btn => btn.classList.remove("active"));
      }

      function resetForm() {
        form.reset();
        clearChipSelection();
      }

      // Chip click: select/deselect concern (does NOT require message)
      chipsWrap.addEventListener("click", (e) => {
        const btn = e.target.closest(".chip");
        if (!btn) return;

        const concern = btn.dataset.concern || btn.textContent.trim();
        const isActive = btn.classList.contains("active");

        chipsWrap.querySelectorAll(".chip.active").forEach(b => b.classList.remove("active"));

        if (isActive) {
          selectedConcern = "";
        } else {
          btn.classList.add("active");
          selectedConcern = concern;
        }
      });

      // Submit: allow (chip only) OR (message only) OR both
      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const building = buildingEl.value.trim();
        const room = roomEl.value.trim();
        const seat = seatEl.value.trim();
        const message = messageEl.value.trim();

        // Minimal validation for location info (usually required)
        if (!building || !room || seat === "") return;

        // Must have at least a selected concern OR a message
        if (!selectedConcern && !message) return;

        // Create a new ticket (demo behavior)
        tickets = [
          { room: room.toUpperCase(), seat: Number(seat), status: "Pending" },
          ...tickets
        ];
        renderTickets();
        resetForm();
      });

      cancelBtn.addEventListener("click", () => resetForm());

      // Initial render
      renderTickets();
    })();
  </script>
</body>
</html>
