<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RESERVE++: User Dashboard</title>
</head>

<body>
	<div class="dashboard-container">
		<nav class="sidebar">
			<div class="logo">RS++</div>
			<ul class="nav-links">
				<li><i class="icon-home"></i></li>
				<li><i class="icon-monitor"></i></li>
				<li><i class="icon-chat"></i></li>
				<li><i class="icon-notif"></i></li>
			</ul>
		</nav>

		<main class="main-content">
			<header>
				<h1>Hi, User!</h1>
				<p>Let's get you a seat at the lab</p>
				<input type="text" placeholder="Search for Labs here...">
			</header>

			<section class="hero-slider">
				<h2>Labs Open Today</h2>
				<div class="card-row">
					<!-- Images and text here for now -->
				</div>
			</section>

			<div class="bottom-grid">
				<div class="notifications">
					<h3>Notifications</h3>
				</div>
				<div class="it-assist">
					<h3>IT Assist</h3>
					<textarea placeholder="Request for assistance..."></textarea>
				</div>
			</div>
		</main>

		<aside class="right-panel">
			<div class="profile-card">
				<img src="../img/def_avatar.jpg" alt="Profile">
				<p>First Name Last Name</p>
				<button>Edit Profile</button>
			</div>
			<div class="reservations">
				<h3>My Reservations</h3>
			</div>
			<div class="calendar">
			</div>
		</aside>
	</div>
</body>

</html>
