<!DOCTYPE html>
<html lang="en">
<head>
  <!--========================= META + TITLE =========================-->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In</title>

  <!--========================= FONTS =========================-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!--========================= PAGE STYLES =========================-->
  <link rel="stylesheet" href="../css/login.css">
</head>

<body class="page page--login">

  <!--========================= BACKGROUND LAYER =========================-->
  <div class="app-bg"></div>

  <!--========================= AUTH WRAPPER =========================-->
  <main class="auth-wrap">

    <section class="auth-card">

      <!--========================= LEFT: LOGIN FORM =========================-->
      <div class="auth-left">
        <h1 class="auth-title">Log In</h1>

        <form class="auth-form" id="loginForm" action="#" method="post">

          <!------------------ Username / Email ------------------>
          <label class="field">
            <span class="sr-only">Username/Email</span>
            <input 
              type="text" 
              id="username" 
              placeholder="Username/Email" 
              required
            >
          </label>

          <!------------------ Password ------------------>
          <label class="field">
            <span class="sr-only">Password</span>
            <input 
              type="password" 
              id="password"
              placeholder="Password" 
              required
            >
          </label>

          <!------------------ Forgot Password ------------------>
          <a class="auth-link" href="./forgot.html">
            Forgot Password
          </a>

          <!------------------ Submit Button ------------------>
          <button class="btn-grad" type="submit">
            Log In
          </button>

          <!------------------ Sign Up Link ------------------>
          <a class="auth-link bottom" href="./signup.html">
            Not yet a member? Sign up now
          </a>

        </form>
      </div>

      <!--========================= RIGHT: IMAGE PANEL =========================-->
      <div class="auth-right">
        <img 
          src="../img/rightimg.png" 
          alt="Computer Laboratory" 
          class="auth-img"
        >
      </div>

    </section>
  </main>

  <!--========================= LOGIN SCRIPT =========================-->
  <script>
    const form = document.getElementById('loginForm');

    form.addEventListener('submit', function (e) {
      e.preventDefault(); // Prevent actual submission (demo logic)

      const username = document
        .getElementById('username')
        .value
        .trim()
        .toLowerCase();

      // Simple role-based redirect
      if (username === 'admin') {
        localStorage.setItem('role', 'admin');
        location.href = './admindashboard.html';
      } else {
        localStorage.setItem('role', 'student');
        location.href = './dashboard.html';
      }
    });
  </script>

</body>
</html>
